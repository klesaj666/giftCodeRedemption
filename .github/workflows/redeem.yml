name: Run Gift Code Redeemer

on:
  workflow_dispatch:
    inputs:
      gift_code:
        description: 'Enter the Gift Code to redeem'
        required: true
        type: string

jobs:
  run-redemption:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget google-chrome-stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Script
        run: |
          python redeemCode.py "${{ github.event.inputs.gift_code }}"
